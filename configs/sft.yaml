dataset_path: data/samples/sft_sample.jsonl
output_dir: outputs/sft
dataset_format: prompt_completion
template_backend: default_chat_template
append_eos_to_completion: false
train_on_prompt: false
response_template: "Assistant:"
learning_rate: 0.0002
batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 1
max_steps: -1
warmup_ratio: 0.03
logging_steps: 10
eval_steps: 100
save_steps: 100
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
packing: false
seed: 42
